<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAI — Doctor Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="logo">🏥 MediAI</div>
    <div class="user-info">
      <span class="role-badge doctor">Doctor</span>
      <span id="doctor-name">Loading...</span>
      <a href="index.html" class="btn btn-outline" style="padding:6px 12px;font-size:12px;">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('patients',this)">👥 Patients</button>
      <button class="tab" onclick="showTab('alerts',this)">🚨 Alerts</button>
      <button class="tab" onclick="showTab('reports',this)">📊 Reports</button>
    </div>

    <div id="tab-patients" class="tab-content">
      <div class="grid grid-3">
        <div class="card"><div class="stat-value" id="stat-patients">-</div><div class="stat-label">Patients</div></div>
        <div class="card"><div class="stat-value" id="stat-alerts">-</div><div class="stat-label">Unread Alerts</div></div>
        <div class="card"><div class="stat-value" id="stat-unsigned">-</div><div class="stat-label">Unsigned Reports</div></div>
      </div>
      <h2 style="margin:20px 0 12px">My Patients</h2>
      <div id="patient-list"></div>
    </div>

    <div id="tab-alerts" class="tab-content" style="display:none">
      <h2 style="margin-bottom:12px">🚨 Critical Alerts</h2>
      <div id="alert-list"></div>
    </div>

    <div id="tab-reports" class="tab-content" style="display:none">
      <h2 style="margin-bottom:12px">📊 Unsigned AI Reports</h2>
      <div id="report-list"></div>
    </div>
  </div>

  <script>
    const API = '';
    let currentDoctorId = null;

    async function init() {
      try {
        const res = await fetch(`${API}/api/auth/users?role=doctor`);
        const data = await res.json();
        if (data.success && data.data.length > 0) {
          const user = data.data[0];
          document.getElementById('doctor-name').textContent = user.name;
          const pRes = await fetch(`${API}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: user.email, role: 'doctor' }) });
          const pData = await pRes.json();
          if (pData.success && pData.data.profile) { currentDoctorId = pData.data.profile.id; loadAll(); }
        } else { document.getElementById('doctor-name').textContent = 'No doctors — seed data first'; }
      } catch { document.getElementById('doctor-name').textContent = 'Server offline'; }
    }

    function loadAll() { loadPatients(); loadAlerts(); loadReports(); }

    function showTab(name, el) {
      document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
      document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
      document.getElementById(`tab-${name}`).style.display = 'block';
      el.classList.add('active');
    }

    async function loadPatients() {
      try {
        const r = await fetch(`${API}/api/auth/users?role=patient`); const d = await r.json();
        if (d.success) {
          document.getElementById('stat-patients').textContent = d.data.length;
          document.getElementById('patient-list').innerHTML = d.data.map(p => `<div class="card"><h3>🩺 ${p.name}</h3><p>${p.email} · ${p.phone}</p></div>`).join('') || '<div class="empty-state">No patients</div>';
        }
      } catch {}
    }

    async function loadAlerts() {
      if (!currentDoctorId) return;
      try {
        const r = await fetch(`${API}/api/ai/alerts?role=doctor&userId=${currentDoctorId}`); const d = await r.json();
        if (d.success) {
          const unread = d.data.filter(a => !a.read);
          document.getElementById('stat-alerts').textContent = unread.length;
          document.getElementById('alert-list').innerHTML = d.data.map(a => `<div class="card" style="border-left:3px solid ${a.type==='critical'?'var(--accent-danger)':a.type==='weekly'?'var(--accent-warning)':'var(--accent-primary)'}"><div style="display:flex;justify-content:space-between"><span class="risk-${a.type==='critical'?'critical':'medium'}" style="font-weight:700;text-transform:uppercase;font-size:12px">${a.type}</span><span style="font-size:12px;color:var(--text-muted)">${new Date(a.created_at).toLocaleString()}</span></div><p style="margin-top:8px">${a.message}</p>${a.ai_explanation?`<p style="font-size:12px;color:var(--text-secondary);margin-top:4px">${a.ai_explanation.substring(0,200)}</p>`:''}<div style="margin-top:8px">${!a.read?`<button class="btn btn-outline" style="font-size:11px;padding:4px 10px" onclick="markRead('${a.id}')">Mark Read</button>`:''}</div></div>`).join('') || '<div class="empty-state">No alerts</div>';
        }
      } catch {}
    }

    async function loadReports() {
      try {
        const r = await fetch(`${API}/api/ai/reports/unsigned`); const d = await r.json();
        if (d.success) {
          document.getElementById('stat-unsigned').textContent = d.data.length;
          document.getElementById('report-list').innerHTML = d.data.map(r => `<div class="card"><div style="display:flex;justify-content:space-between"><h3>📊 ${r.week_of}</h3><span class="risk-${r.risk_level}">${r.risk_level.toUpperCase()}</span></div><p style="margin-top:8px">${(r.summary||'').substring(0,300)}</p><button class="btn btn-success" style="margin-top:12px;font-size:12px" onclick="signReport('${r.id}')">✅ Sign Report</button></div>`).join('') || '<div class="empty-state">No unsigned reports</div>';
        }
      } catch {}
    }

    async function markRead(id) {
      try { await fetch(`${API}/api/ai/alerts/${id}/read`, { method: 'POST' }); loadAlerts(); } catch {}
    }

    async function signReport(id) {
      try { await fetch(`${API}/api/ai/reports/${id}/sign`, { method: 'POST' }); loadReports(); toast('Report signed!', 'success'); } catch (e) { toast(e.message, 'error'); }
    }

    function toast(msg, type='info') { const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000); }

    init();
  </script>
</body>
</html>
