services:
  # Node.js Backend Service
  - type: web
    name: mediai-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      # Define your secret keys heavily reliant in Render Dashboard:
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY
      # - OPENROUTER_API_KEY
      # - TWILIO_ACCOUNT_SID
      # - TWILIO_AUTH_TOKEN
      # - TWILIO_PHONE_NUMBER
      # - FRONTEND_URL
      # - AI_SERVICE_URL (This should point to the AI service URL once deployed)

  # Python AI Service
  - type: web
    name: mediai-ai
    env: python
    plan: free
    rootDir: backend/ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      # Define secret keys if Python AI needs any, e.g. OpenRouter:
      # - OPENROUTER_API_KEY
